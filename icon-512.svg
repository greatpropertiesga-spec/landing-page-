    <line x1="140" y1="308" x2="200" y2="308" stroke="white" stroke-width="4"/>
    <line x1="342" y1="278" x2="342" y2="338" stroke="white" stroke-width="4"/>
    <line x1="312" y1="308" x2="372" y2="308" stroke="white" stroke-width="4"/>
  </g>
